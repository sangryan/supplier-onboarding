version: '3.9'

services:
  app:
    build: .
    container_name: betika_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 8000
    volumes:
      - uploads_data:/app/uploads
    networks:
      - betika_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: betika_nginx
    restart: unless-stopped
    ports:
      - "2026:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - betika_net

volumes:
  uploads_data:
    name: betika_uploads

networks:
  betika_net:
    driver: bridge
